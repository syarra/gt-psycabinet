name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.CI_TOKEN }}
      - uses: ./.ci
        with:
          baseline-name: 'GtPsyCabinet'
          test-suite-name: 'Gt-PsyCabinet Tests'
